<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - RFID Gateway</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 40px; }
        .box { max-width: 500px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-top: 0; }
        .status { color: #dc2626; font-weight: bold; }
        a { color: #2563eb; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Error</h1>
        <p class="status" th:text="${status}">status</p>
        <p th:if="${error}" th:text="${error}">error</p>
        <p th:if="${message}" th:text="${message}">message</p>
        <p><a href="/">Ir al inicio</a> · <a href="/api/status">API Estado</a> · <a href="/api/health">API Health</a></p>
    </div>
</body>
</html>
