spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:rfidgateway}
    username: ${DB_USER:rfiduser}
    password: ${DB_PASSWORD}

# Opcional: filtrar lecturas con señal débil. Ej: -70 para ignorar tags con RSSI < -70 dBm
# rfid:
#   rssi-min-dbm: -70

logging:
  level:
    root: WARN
    com.rfidgateway: INFO







