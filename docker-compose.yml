services:
  postgres:
    image: postgres:15-alpine
    container_name: rfidgateway-postgres
    environment:
      - POSTGRES_DB=rfidgateway
      - POSTGRES_USER=rfiduser
      - POSTGRES_PASSWORD=changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfiduser -d rfidgateway"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rfid-network

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfidgateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=rfidgateway
      - DB_USER=rfiduser
      - DB_PASSWORD=changeme
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - rfid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
    driver: local

networks:
  rfid-network:
    driver: bridge
